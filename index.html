<!DOCTYPE html>
<html>
<head>
  <title>Income Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>💰 Tracker</h2>
    <ul>
      <li>Dashboard</li>
      <li>Projects</li>
      <li>Reports</li>
    </ul>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Cards -->
    <div class="cards">
      <div class="card">Total: $<span id="total">0</span></div>
      <div class="card">Monthly: $<span id="monthly">0</span></div>
      <div class="card">Pending: $<span id="pending">0</span></div>
    </div>

    <!-- Chart -->
    <div class="chart">
      <canvas id="chart"></canvas>
    </div>

    <!-- Add Button -->
    <button class="add-btn" onclick="toggleForm()">+ Add Project</button>

    <!-- Form -->
    <div id="form" class="form hidden">
      <input id="name" placeholder="Project Name">
      <input id="amount" type="number" placeholder="Amount">
      <select id="status">
        <option value="paid">Paid</option>
        <option value="pending">Pending</option>
      </select>
      <input id="date" type="date">
      <button onclick="addProject()">Save</button>
    </div>

    <!-- Table -->
    <table>
      <thead>
        <tr>
          <th>Project</th>
          <th>Amount</th>
          <th>Status</th>
          <th>Date</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="list"></tbody>
    </table>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
